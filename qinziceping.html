<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亲子关系温度计 - 10题深度测评</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .intro {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            line-height: 1.8;
            color: #555;
        }
        
        .question {
            display: none;
            animation: fadeIn 0.5s;
        }
        
        .question.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .question-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        
        .question-number {
            color: #667eea;
            font-size: 24px;
        }
        
        .option {
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }
        
        .option:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .option.selected {
            background: #e7f3ff;
            border-color: #667eea;
        }
        
        .option-label {
            background: #667eea;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .option.selected .option-label {
            background: #764ba2;
        }
        
        .option-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }
        
        .option-score {
            color: #999;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-prev {
            background: #6c757d;
            color: white;
        }
        
        .btn-prev:hover {
            background: #5a6268;
        }
        
        .btn-next {
            background: #667eea;
            color: white;
        }
        
        .btn-next:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
        }
        
        .btn-submit:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .progress {
            background: #e9ecef;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.5s;
        }
        
        .result {
            display: none;
            animation: fadeIn 0.8s;
        }
        
        .result.active {
            display: block;
        }
        
        .result-header {
            text-align: center;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .result-header.red {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }
        
        .result-header.yellow {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .result-header.green {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .result-header.excellent {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        
        .result-score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .result-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-desc {
            font-size: 18px;
            line-height: 1.6;
        }
        
        .result-suggestion {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
            line-height: 1.8;
            color: #555;
        }
        
        .result-suggestion h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .course-promotion {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            text-align: center;
        }
        
        .course-promotion h2 {
            font-size: 26px;
            margin-bottom: 15px;
        }
        
        .course-promotion p {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 10px;
        }
        
        .course-promotion .highlight {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .btn-course {
            display: inline-block;
            background: #ffd700;
            color: #333;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .btn-course:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        
        .restart {
            text-align: center;
            margin-top: 30px;
        }
        
        .btn-restart {
            background: #6c757d;
            color: white;
        }
        
        .btn-restart:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌡️ 亲子关系温度计</h1>
            <p>10题深度测评，了解您的亲子关系状态</p>
        </div>
        
        <div class="content">
            <div class="intro" id="intro">
                <h2>📋 测前说明</h2>
                <p><strong>请根据最近一个月的真实情况选择最符合的选项。</strong></p>
                <p>每题仅选一项，总分自动累加。</p>
                <p>完成测评后，您将获得一份专属的亲子关系诊断报告。</p>
                <br>
                <button class="btn-next" onclick="startTest()" style="width: 100%;">开始测评</button>
            </div>
            
            <div class="progress" id="progressContainer" style="display: none;">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div id="questionsContainer" style="display: none;"></div>
            
            <div class="buttons" id="navButtons" style="display: none;">
                <button class="btn-prev" onclick="prevQuestion()">上一题</button>
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()">下一题</button>
                <button class="btn-submit" id="submitBtn" onclick="submitTest()" style="display: none;">查看结果</button>
            </div>
            
            <div class="result" id="resultContainer"></div>
        </div>
    </div>
    
    <script>
        const questions = [
            {
                id: 1,
                title: "（沟通主动）孩子回家后，主动跟你聊天（不包括要钱、问作业）的频率是？",
                options: [
                    { label: "A", text: "每天都会主动聊", score: 5 },
                    { label: "B", text: "2-3天聊一次", score: 4 },
                    { label: "C", text: "一周聊一次", score: 2 },
                    { label: "D", text: "基本不主动，都是我问他答", score: 0 }
                ]
            },
            {
                id: 2,
                title: "（屏幕冲突）最近一个月，你跟孩子因为手机/平板发生过冲突吗？",
                options: [
                    { label: "A", text: "从来没有", score: 5 },
                    { label: "B", text: "1-2次，但很快就过去了", score: 4 },
                    { label: "C", text: "3-5次，有点伤感情", score: 2 },
                    { label: "D", text: "经常吵，我甚至想过摔手机", score: 0 }
                ]
            },
            {
                id: 3,
                title: "（作业情绪）辅导孩子作业时，你最常出现的情绪是？",
                options: [
                    { label: "A", text: "平和，他做错了我能耐心讲", score: 5 },
                    { label: "B", text: "偶尔着急，但能忍住", score: 4 },
                    { label: "C", text: "经常火大，忍不住要吼", score: 2 },
                    { label: "D", text: "辅导作业就像上战场，我快崩溃了", score: 0 }
                ]
            },
            {
                id: 4,
                title: "（情绪承接）当孩子跟你说"不想上学"时，你的第一反应通常是？",
                options: [
                    { label: "A", text: "先问"怎么了，发生什么事了？"", score: 5 },
                    { label: "B", text: "先安慰"没事的，每个人都会累"", score: 4 },
                    { label: "C", text: "直接讲道理"不上学以后怎么办"", score: 2 },
                    { label: "D", text: "生气"不行，必须去"", score: 0 }
                ]
            },
            {
                id: 5,
                title: "（信任安全）孩子在你面前，能放心地说出自己的真实想法吗（包括负面情绪）？",
                options: [
                    { label: "A", text: "完全可以，他经常跟我吐槽", score: 5 },
                    { label: "B", text: "大部分可以，但有些事他会藏在心里", score: 4 },
                    { label: "C", text: "不太能，他比较怕我生气", score: 2 },
                    { label: "D", text: "几乎不能，他在我面前很拘谨", score: 0 }
                ]
            },
            {
                id: 6,
                title: "（尊重边界）当孩子自己做的决定（比如选兴趣班、穿什么衣服）与你意见不同时，你通常会？",
                options: [
                    { label: "A", text: "支持他的选择，让他尝试", score: 5 },
                    { label: "B", text: "会提建议，但最终尊重他的决定", score: 4 },
                    { label: "C", text: "坚持让他听我的，反复说服", score: 2 },
                    { label: "D", text: "直接否决，必须按我的来", score: 0 }
                ]
            },
            {
                id: 7,
                title: "（陪伴质量）在过去一周里，你和孩子有过"不刷手机、不谈学习、纯粹一起玩"的时间吗？",
                options: [
                    { label: "A", text: "有，3次以上", score: 5 },
                    { label: "B", text: "有，1-2次", score: 4 },
                    { label: "C", text: "几乎没有，但我想有", score: 2 },
                    { label: "D", text: "没有，没时间也没心思", score: 0 }
                ]
            },
            {
                id: 8,
                title: "（期望压力）你对孩子的学习成绩或未来发展的期望，给孩子带来的压力感如何？",
                options: [
                    { label: "A", text: "他基本没压力，觉得我要求合理", score: 5 },
                    { label: "B", text: "有一点压力，但能转化为动力", score: 4 },
                    { label: "C", text: "压力较大，他有时会说"你别逼我"", score: 2 },
                    { label: "D", text: "压力很大，他已经出现逃避、焦虑情绪", score: 0 }
                ]
            },
            {
                id: 9,
                title: "（犯错接纳）当孩子犯了错（比如打碎东西、考试粗心），你的第一反应通常是？",
                options: [
                    { label: "A", text: "先关心他有没有受伤/受惊，再一起想办法", score: 5 },
                    { label: "B", text: "说"没关系，下次注意"，但心里有点不高兴", score: 4 },
                    { label: "C", text: "忍不住批评"你怎么这么不小心"", score: 2 },
                    { label: "D", text: "发火骂人，甚至惩罚", score: 0 }
                ]
            },
            {
                id: 10,
                title: "（家务合作）关于家里的规则或家务分工，你和孩子的关系是？",
                options: [
                    { label: "A", text: "一起商量制定，他主动参与", score: 5 },
                    { label: "B", text: "我说了他基本会做，但偶尔需要提醒", score: 4 },
                    { label: "C", text: "经常因为家务或规矩争吵", score: 2 },
                    { label: "D", text: "他完全不管，叫不动", score: 0 }
                ]
            }
        ];
        
        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let totalScore = 0;
        
        function startTest() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('questionsContainer').style.display = 'block';
            document.getElementById('navButtons').style.display = 'flex';
            showQuestion(0);
        }
        
        function showQuestion(index) {
            const container = document.getElementById('questionsContainer');
            const q = questions[index];
            
            let html = `
                <div class="question active" id="question${q.id}">
                    <div class="question-title">
                        <span class="question-number">题目${q.id}</span>：${q.title}
                    </div>
            `;
            
            q.options.forEach((option, optIndex) => {
                const isSelected = answers[index] === optIndex;
                html += `
                    <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${index}, ${optIndex})">
                        <div class="option-label">${option.label}</div>
                        <div class="option-text">${option.text}</div>
                        <div class="option-score">（${option.score}分）</div>
                    </div>
                `;
            });
            
            html += `</div>`;
            container.innerHTML = html;
            
            updateProgress();
            updateButtons();
        }
        
        function selectOption(qIndex, optIndex) {
            answers[qIndex] = optIndex;
            showQuestion(qIndex);
        }
        
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }
        
        function updateButtons() {
            const prevBtn = document.querySelector('.btn-prev');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');
            
            prevBtn.style.display = currentQuestion === 0 ? 'none' : 'block';
            
            if (currentQuestion === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }
        }
        
        function nextQuestion() {
            if (answers[currentQuestion] === null) {
                alert('请先选择答案再继续！');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
            }
        }
        
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }
        
        function submitTest() {
            if (answers[currentQuestion] === null) {
                alert('请先选择答案再提交！');
                return;
            }
            
            totalScore = 0;
            answers.forEach((answer, index) => {
                if (answer !== null) {
                    totalScore += questions[index].options[answer].score;
                }
            });
            
            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('navButtons').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'none';
            
            showResult();
        }
        
        function showResult() {
            const resultContainer = document.getElementById('resultContainer');
            let resultHTML = '';
            
            if (totalScore <= 15) {
                resultHTML = `
                    <div class="result-header red">
                        <div class="result-score">🔴 ${totalScore}分</div>
                        <div class="result-title">亲子关系"红灯"——关系紧张，急需干预</div>
                        <div class="result-desc">您的亲子关系已经亮起红灯。孩子可能经常对您关闭心门，冲突频繁，甚至出现对抗或冷漠。</div>
                    </div>
                    <div class="result-suggestion">
                        <h3>💊 急救建议</h3>
                        <p><strong>未来一周，请停止所有批评、说教和命令。</strong></p>
                        <p>每天只做一件事：在孩子情绪平稳时，对他说一句"我注意到你……（具体肯定，比如主动倒了垃圾）"，不说"但是"。</p>
                        <p>同时，<strong>强烈建议您参加亲子关系系统课程</strong>，学习非暴力沟通方法。</p>
                    </div>
                `;
            } else if (totalScore <= 25) {
                resultHTML = `
                    <div class="result-header yellow">
                        <div class="result-score">🟠 ${totalScore}分</div>
                        <div class="result-title">亲子关系"黄灯"——危机潜伏，需要重点改善</div>
                        <div class="result-desc">您的亲子关系处于亚健康状态。日常沟通尚可，但深层次信任和冲突管理存在明显短板。孩子可能已经学会"报喜不报忧"或在某些话题上回避你。</div>
                    </div>
                    <div class="result-suggestion">
                        <h3>🔧 改善建议</h3>
                        <p><strong>本周内尝试"深度倾听"</strong>——当孩子说话时，你只点头、不评判、不给建议，坚持听完5分钟。</p>
                        <p>每周至少一次"家庭无屏幕时间"，一起做饭或散步。</p>
                    </div>
                `;
            } else if (totalScore <= 38) {
                resultHTML = `
                    <div class="result-header green">
                        <div class="result-score">🟢 ${totalScore}分</div>
                        <div class="result-title">亲子关系"绿灯"——关系良好，继续升温</div>
                        <div class="result-desc">您的亲子关系整体健康，孩子愿意跟您交流大部分事情，家庭氛围比较融洽。但仍有一些小摩擦或未被察觉的"暗礁"。</div>
                    </div>
                    <div class="result-suggestion">
                        <h3>🚀 提升建议</h3>
                        <p><strong>建立"家庭分享会"仪式</strong>，每周一次，每人分享一件开心的事和一件烦恼的事。</p>
                        <p>同时，注意检查自己的"期望压力"是否不知不觉在增加。</p>
                    </div>
                `;
            } else {
                resultHTML = `
                    <div class="result-header excellent">
                        <div class="result-score">🌟 ${totalScore}分</div>
                        <div class="result-title">亲子关系"优秀"——信任深厚，孩子视你为港湾</div>
                        <div class="result-desc">恭喜！您的亲子关系非常出色。孩子在你面前有足够的安全感，你也懂得尊重和承接他的情绪。你们的家庭是很多人羡慕的样子。</div>
                    </div>
                    <div class="result-suggestion">
                        <h3>💝 传递建议</h3>
                        <p><strong>请把你做得好的方法分享给身边一位朋友或家人</strong>，帮助更多家庭走出困境。</p>
                        <p>同时，继续保持高质量的陪伴和开放的沟通。</p>
                    </div>
                `;
            }
            
            resultHTML += `
                <div class="course-promotion">
                    <h2>🎓 想进一步提升亲子关系？</h2>
                    <p>在所有评测结果后，我想邀请你参加：</p>
                    <div class="highlight">
                        5月26-28日 晚上8-9点<br>
                        007社群3天亲子破冰课<br>
                        陪你一起升级亲子关系
                    </div>
                    <p>原价：<del>199元</del></p>
                    <p><strong>限时免费中 🎉</strong></p>
                    <!-- 课程海报区域：请替换下面的src为你的海报图片地址 -->
                    <div style="margin: 20px 0; text-align: center;">
                        <img id="coursePoster" src="课程海报.jpg" alt="课程海报" style="max-width: 100%; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">
                    </div>
                    <p style="margin-top: 15px;">📱 长按识别二维码，立即加入课程群</p>
                    <a href="#" class="btn-course" onclick="alert('请扫描上方海报二维码加入课程群！'); return false;">扫描二维码加入</a>
                </div>
                
                <div class="restart">
                    <button class="btn-restart" onclick="restartTest()">重新测评</button>
                </div>
            `;
            
            resultContainer.innerHTML = resultHTML;
            resultContainer.classList.add('active');
        }
        
        function restartTest() {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            totalScore = 0;
            
            document.getElementById('resultContainer').classList.remove('active');
            document.getElementById('resultContainer').innerHTML = '';
            
            document.getElementById('intro').style.display = 'block';
        }
    </script>
</body>
</html>
